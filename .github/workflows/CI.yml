name: CI tests

on:
  push:
    branches:
      - CI

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: Run validation script
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo
      - uses: actions/checkout@v4

      # 2. Set up Julia
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      # 3. Execute the script
      - name: Run validations
        run: bash run_validations.sh


